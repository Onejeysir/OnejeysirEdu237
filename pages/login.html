<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — OnejeysirEdu237</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../src/css/tokens.css">
<link rel="stylesheet" href="../src/css/base.css">
<link rel="stylesheet" href="../src/css/components.css">
<link rel="stylesheet" href="../src/css/pages.css">
<script defer src="../src/js/theme.js"></script>
</head>
<body>

<div class="auth-shell">
  <div class="auth-shell__form">
    <div class="auth-shell__form-inner">
      <a href="../index.html" class="auth-back">← Retour à l'accueil</a>
      <h2>Content de te revoir</h2>
      <p style="margin-bottom: var(--space-8);">Connecte-toi pour continuer ta préparation.</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Adresse email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <div style="display:flex; justify-content:flex-end; margin-bottom: var(--space-4);">
          <a href="forgot-password.html" style="font-size: var(--fs-sm); color: var(--text-muted);">Mot de passe oublié ?</a>
        </div>

        <p id="form-message" role="alert" style="display:none; font-size: var(--fs-sm); padding: var(--space-3); border-radius: var(--radius-md); margin-bottom: var(--space-4);"></p>

        <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
      </form>

      <p class="auth-foot">Pas encore de compte ? <a href="register.html" style="color: var(--color-gold-500); font-weight:600;">Créer un compte</a></p>
    </div>
  </div>

  <div class="auth-shell__visual">
    <div class="auth-shell__visual-content">
      <h2>Reprends là où tu t'es arrêté</h2>
      <p>Ton tableau de bord, tes statistiques et ton programme de révision t'attendent.</p>
    </div>
  </div>
</div>

<script type="module">
import { AuthService } from '../src/js/services/auth-service.js';

const form = document.getElementById('login-form');
const message = document.getElementById('form-message');

function showMessage(text, type) {
  message.textContent = text;
  message.style.display = 'block';
  message.style.background = type === 'error' ? 'rgba(226,87,76,0.12)' : 'rgba(47,158,110,0.12)';
  message.style.color = type === 'error' ? 'var(--accent-danger)' : 'var(--accent-success)';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await AuthService.login({ email: form.email.value.trim(), password: form.password.value });
    showMessage('Connexion réussie. Redirection…', 'success');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
  } catch (err) {
    showMessage(err.message, 'error');
  }
});
</script>

</body>
</html>
